<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VPS Glass · iOS 26 Liquid Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, #1a1f2e, #070a12);
            font-family: -apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background hoa thị - hiệu ứng bồng bềnh */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 30% 40%, rgba(80, 140, 255, 0.15), transparent 65%);
            pointer-events: none;
            animation: floatLiquid 22s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -20%;
            width: 130%;
            height: 130%;
            background: radial-gradient(circle at 70% 80%, rgba(160, 100, 255, 0.1), transparent 70%);
            pointer-events: none;
            animation: floatLiquid2 28s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes floatLiquid {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(4%, 3%) scale(1.05) rotate(2deg); }
        }

        @keyframes floatLiquid2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-3%, -4%) scale(1.08) rotate(-2deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Header kính mờ */
        .glass-header {
            text-align: center;
            margin-bottom: 36px;
            backdrop-filter: blur(24px) saturate(180%);
            background: rgba(20, 28, 48, 0.35);
            border-radius: 80px;
            padding: 24px 20px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .glass-header h1 {
            font-size: 2.8rem;
            font-weight: 650;
            background: linear-gradient(135deg, #F5F9FF, #B0D4FF, #7AB0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .glass-header p {
            color: rgba(200, 215, 250, 0.75);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Layout 2 cột */
        .dashboard {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .panel-left {
            flex: 1.1;
            min-width: 320px;
        }

        .panel-right {
            flex: 1.9;
            min-width: 420px;
        }

        /* Card chính - hiệu ứng kính */
        .glass-card {
            background: rgba(18, 26, 46, 0.45);
            backdrop-filter: blur(28px) saturate(180%);
            border-radius: 44px;
            border: 0.8px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), inset 0 0.5px 0 rgba(255, 255, 255, 0.08);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-bottom: 24px;
            padding: 28px 26px;
        }

        .glass-card:hover {
            background: rgba(28, 38, 60, 0.55);
            border-color: rgba(255, 255, 255, 0.28);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .card-header .icon-bg {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #2C6EFF, #1A4FCC);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 8px 18px rgba(44, 110, 255, 0.3);
        }

        .card-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #EEF3FF;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            color: #C5D6FF;
            font-size: 0.85rem;
            font-weight: 510;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        input, select {
            width: 100%;
            padding: 14px 20px;
            background: rgba(6, 12, 24, 0.7);
            border: 1px solid rgba(100, 140, 220, 0.5);
            border-radius: 40px;
            font-size: 0.95rem;
            color: white;
            font-weight: 460;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #5E9CFF;
            background: rgba(12, 20, 36, 0.9);
            box-shadow: 0 0 0 4px rgba(94, 156, 255, 0.15);
        }

        button {
            background: linear-gradient(105deg, #2C6EFF, #1A4FCC);
            border: none;
            padding: 14px 24px;
            border-radius: 48px;
            font-weight: 620;
            font-size: 1rem;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(44, 110, 255, 0.35);
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.55;
            transform: none;
        }

        .status-badge {
            margin-top: 16px;
            padding: 12px 18px;
            border-radius: 40px;
            display: none;
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
        }

        .status-badge.show {
            display: block;
        }

        .status-badge.success {
            background: rgba(60, 200, 120, 0.2);
            border: 0.5px solid rgba(80, 230, 140, 0.7);
            color: #C0FFE0;
        }

        .status-badge.error {
            background: rgba(255, 70, 90, 0.18);
            border: 0.5px solid #FF7070;
            color: #FFC0C0;
        }

        .status-badge.loading {
            background: rgba(255, 180, 60, 0.15);
            border: 0.5px solid #FFB347;
            color: #FFE2B5;
        }

        /* Danh sách VM */
        .vm-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .vm-grid::-webkit-scrollbar {
            width: 4px;
        }

        .vm-grid::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .vm-grid::-webkit-scrollbar-thumb {
            background: rgba(94,156,255,0.5);
            border-radius: 10px;
        }

        .vm-card {
            background: rgba(12, 20, 36, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 20px 24px;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s;
            cursor: pointer;
        }

        .vm-card:hover {
            background: rgba(24, 34, 54, 0.75);
            border-color: rgba(100, 160, 255, 0.5);
            transform: translateX(5px);
        }

        .vm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .vm-os {
            font-weight: 650;
            font-size: 1.2rem;
            background: linear-gradient(120deg, #F0F5FF, #B8D0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vm-timer {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #FFE5A3;
        }

        .vm-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: #A0B5E0;
            margin-bottom: 8px;
        }

        .vm-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 28px;
            margin-top: 0;
        }

        .vm-card.expanded .vm-detail {
            max-height: 220px;
            margin-top: 14px;
            padding: 14px;
        }

        .detail-row {
            font-family: monospace;
            font-size: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn-delete {
            background: rgba(255, 100, 100, 0.2);
            border: 0.5px solid rgba(255, 120, 120, 0.6);
            color: #FFB7B7;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.7rem;
            width: auto;
            cursor: pointer;
            margin-top: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #8A9FD0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 48px;
        }

        footer {
            text-align: center;
            color: #5A6E96;
            font-size: 0.7rem;
            margin-top: 30px;
            padding: 20px;
        }

        @media (max-width: 900px) {
            .dashboard {
                flex-direction: column;
            }
            .glass-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-header">
        <h1>🧊 VPS GLASS · iOS 26</h1>
        <p>Liquid Metal · Tự động sinh GitHub VPS · Bồng bềnh như mây</p>
    </div>

    <div class="dashboard">
        <div class="panel-left">
            <div class="glass-card">
                <div class="card-header">
                    <div class="icon-bg">🔐</div>
                    <h2>Khởi tạo nền tảng</h2>
                </div>
                <div class="form-group">
                    <label>🍃 GitHub Token</label>
                    <input type="password" id="github_token" placeholder="ghp_xxxx hoặc github_pat_xxxx">
                </div>
                <button onclick="setupAndDeploy()" id="setupBtn">✨ Tự động tạo repo + Deploy VM</button>
                <div id="setupStatus" class="status-badge"></div>
            </div>

            <div class="glass-card">
                <div class="card-header">
                    <div class="icon-bg">⚙️</div>
                    <h2>Cấu hình máy chủ</h2>
                </div>
                <div class="form-group">
                    <label>⏱️ Thời gian sống</label>
                    <select id="duration">
                        <option value="60">1 giờ</option>
                        <option value="120" selected>2 giờ</option>
                        <option value="240">4 giờ</option>
                        <option value="360">6 giờ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💿 Hệ điều hành</label>
                    <select id="target_os">
                        <option value="windows">🪟 Windows 11</option>
                        <option value="ubuntu">🐧 Ubuntu 22.04</option>
                        <option value="debian">📀 Debian 12</option>
                    </select>
                </div>
                <button onclick="createVM()" id="deployBtn">💨 Kích hoạt VM Glass</button>
                <div id="deployStatus" class="status-badge"></div>
            </div>
        </div>

        <div class="panel-right">
            <div class="glass-card">
                <div class="card-header">
                    <div class="icon-bg">🖥️</div>
                    <h2>Máy chủ đang bay</h2>
                </div>
                <div id="vmList" class="vm-grid">
                    <div class="empty-state">✨ Chưa có VM nào<br>Bấm "Tự động tạo repo + Deploy VM"</div>
                </div>
            </div>
        </div>
    </div>
    <footer>Liquid Glass Engine · GitHub Actions Runner · Tự động thu hồi</footer>
</div>

<script>
    // ======================= QUẢN LÝ VM ẢO (HIỂN THỊ) =======================
    let vmDatabase = [];
    let currentOwner = '';
    let currentRepo = '';

    function showStatus(elementId, msg, type) {
        const el = document.getElementById(elementId);
        if (!el) return;
        el.className = `status-badge show ${type}`;
        el.innerHTML = msg;
        setTimeout(() => el.classList.remove('show'), 5000);
    }

    async function getUserFromToken(token) {
        const res = await fetch('https://api.github.com/user', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Token không hợp lệ');
        const data = await res.json();
        return data.login;
    }

    async function setupAndDeploy() {
        const token = document.getElementById('github_token').value.trim();
        if (!token) {
            alert('Vui lòng nhập GitHub Token');
            return;
        }

        showStatus('setupStatus', '🔄 Đang kiểm tra token...', 'loading');
        document.getElementById('setupBtn').disabled = true;

        try {
            const owner = await getUserFromToken(token);
            const repoName = `vpsglass-${Date.now()}`;
            currentOwner = owner;
            currentRepo = repoName;

            showStatus('setupStatus', `📦 Đang tạo repo: ${repoName}...`, 'loading');

            // Tạo repo thật
            const createRepo = await fetch('https://api.github.com/user/repos', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: repoName,
                    private: false,
                    auto_init: true,
                    description: 'VPS Glass by Liquid Engine'
                })
            });

            if (!createRepo.ok) {
                const err = await createRepo.json();
                throw new Error(err.message || 'Tạo repo thất bại');
            }

            showStatus('setupStatus', '📤 Đang upload workflow...', 'loading');

            // Nội dung workflow YAML (backend thực sự)
            const workflowYAML = `name: VPS Glass Deploy

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration (minutes)'
        required: true
        default: '120'
      target_os:
        description: 'Target OS'
        required: true
        default: 'windows'

jobs:
  windows:
    runs-on: windows-latest
    if: github.event.inputs.target_os == 'windows'
    timeout-minutes: 360
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\\System\\CurrentControlSet\\Control\\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
      - name: Create User & Pass
        run: |
          $user = "glass_" + (Get-Random -Minimum 1000 -Maximum 9999)
          $pass = -join (((65..90) + (97..122) + (48..57)) | Get-Random -Count 16 | ForEach-Object {[char]$_})
          net user $user $pass /add
          net localgroup Administrators $user /add
          echo "USERNAME=$user" >> $env:GITHUB_ENV
          echo "PASSWORD=$pass" >> $env:GITHUB_ENV
      - name: Get Public IP
        run: |
          $ip = (Invoke-WebRequest -Uri https://api.ipify.org -UseBasicParsing).Content
          echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
      - name: Keep Alive
        run: |
          $dur = [int]"\${{ github.event.inputs.duration }}"
          $end = (Get-Date).AddMinutes($dur)
          while ((Get-Date) -lt $end) { Start-Sleep -Seconds 60 }

  linux:
    runs-on: ubuntu-latest
    if: github.event.inputs.target_os != 'windows'
    timeout-minutes: 360
    steps:
      - name: Setup SSH
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openssh-server curl
          sudo systemctl enable ssh
          sudo systemctl start ssh
      - name: Create User
        run: |
          USER="glass_\$((RANDOM % 9000 + 1000))"
          PASS=\$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          sudo useradd -m -s /bin/bash "\$USER"
          echo "\$USER:\$PASS" | sudo chpasswd
          sudo usermod -aG sudo "\$USER"
          echo "USERNAME=\$USER" >> \$GITHUB_ENV
          echo "PASSWORD=\$PASS" >> \$GITHUB_ENV
      - name: Get IP
        run: |
          IP=\$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=\$IP" >> \$GITHUB_ENV
      - name: Keep Alive
        run: |
          DUR=\${{ github.event.inputs.duration }}
          END=\$(( \$(date +%s) + DUR * 60 ))
          while [ \$(date +%s) -lt \$END ]; do sleep 60; done
`;

            const encodedContent = btoa(unescape(encodeURIComponent(workflowYAML)));

            const uploadWorkflow = await fetch(`https://api.github.com/repos/${owner}/${repoName}/contents/.github/workflows/deploy.yml`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Add VPS Glass workflow',
                    content: encodedContent,
                    branch: 'main'
                })
            });

            if (!uploadWorkflow.ok) throw new Error('Upload workflow thất bại');

            // Lưu lại token, owner, repo
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_owner', owner);
            localStorage.setItem('gh_repo', repoName);

            showStatus('setupStatus', `✅ Thành công! Repo: ${repoName} đã sẵn sàng.`, 'success');
            await new Promise(r => setTimeout(r, 1000));
            await createVM();

        } catch (err) {
            showStatus('setupStatus', `❌ Lỗi: ${err.message}`, 'error');
        } finally {
            document.getElementById('setupBtn').disabled = false;
        }
    }

    async function createVM() {
        let token = localStorage.getItem('gh_token');
        let owner = localStorage.getItem('gh_owner');
        let repo = localStorage.getItem('gh_repo');

        if (!token || !owner || !repo) {
            const freshToken = document.getElementById('github_token').value.trim();
            if (!freshToken) {
                alert('Cần nhập GitHub Token và chạy "Tự động tạo repo" trước');
                return;
            }
            await setupAndDeploy();
            return;
        }

        const duration = document.getElementById('duration').value;
        const targetOS = document.getElementById('target_os').value;

        showStatus('deployStatus', '🚀 Đang gửi lệnh tạo VM...', 'loading');
        document.getElementById('deployBtn').disabled = true;

        try {
            const dispatchUrl = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/deploy.yml/dispatches`;
            const res = await fetch(dispatchUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: {
                        duration: duration,
                        target_os: targetOS
                    }
                })
            });

            if (res.ok) {
                const osName = targetOS === 'windows' ? 'Windows 11' : (targetOS === 'ubuntu' ? 'Ubuntu 22.04' : 'Debian 12');
                addVirtualVM({
                    name: osName,
                    ip: 'Đang khởi tạo...',
                    user: 'Đang tạo...',
                    pass: 'Đang tạo...',
                    duration: parseInt(duration)
                });
                showStatus('deployStatus', '✅ Workflow đã kích hoạt! VM sẽ xuất hiện sau 2-3 phút.', 'success');
            } else {
                const errorText = await res.text();
                throw new Error(`HTTP ${res.status}: ${errorText.slice(0, 100)}`);
            }
        } catch (err) {
            showStatus('deployStatus', `❌ Lỗi: ${err.message}`, 'error');
        } finally {
            document.getElementById('deployBtn').disabled = false;
            setTimeout(() => {
                const st = document.getElementById('deployStatus');
                if (st) st.classList.remove('show');
            }, 4000);
        }
    }

    // Quản lý VM hiển thị
    function addVirtualVM(vm) {
        const newVM = {
            id: Date.now() + '_' + Math.random(),
            name: vm.name,
            ip: vm.ip,
            user: vm.user,
            password: vm.pass,
            durationMinutes: vm.duration,
            createdAt: Date.now(),
            expanded: false
        };
        vmDatabase.push(newVM);
        saveVMToLocal();
        renderVMList();
        startTimerForVM(newVM.id);
    }

    function removeVM(id) {
        vmDatabase = vmDatabase.filter(v => v.id !== id);
        saveVMToLocal();
        renderVMList();
    }

    function toggleExpand(id) {
        const vm = vmDatabase.find(v => v.id === id);
        if (vm) vm.expanded = !vm.expanded;
        renderVMList();
    }

    function getRemainingSec(vm) {
        const elapsed = (Date.now() - vm.createdAt) / 1000;
        const remain = vm.durationMinutes * 60 - elapsed;
        return remain > 0 ? remain : 0;
    }

    function formatTime(sec) {
        if (sec <= 0) return 'Hết hạn';
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = Math.floor(sec % 60);
        if (h > 0) return `${h}h ${m}m`;
        if (m > 0) return `${m}m ${s}s`;
        return `${s}s`;
    }

    function updateTimerUI(id) {
        const vm = vmDatabase.find(v => v.id === id);
        if (!vm) return;
        const remain = getRemainingSec(vm);
        const timerEl = document.getElementById(`timer-${id}`);
        if (timerEl) {
            if (remain <= 0) {
                timerEl.innerHTML = 'Hết hạn';
                setTimeout(() => removeVM(id), 2000);
            } else {
                timerEl.innerHTML = formatTime(remain);
            }
        }
    }

    function startTimerForVM(id) {
        setInterval(() => updateTimerUI(id), 1000);
    }

    function saveVMToLocal() {
        const toStore = vmDatabase.map(v => ({
            id: v.id, name: v.name, ip: v.ip, user: v.user, password: v.password,
            durationMinutes: v.durationMinutes, createdAt: v.createdAt, expanded: false
        }));
        localStorage.setItem('vpsglass_vms', JSON.stringify(toStore));
    }

    function loadVMFromLocal() {
        const stored = localStorage.getItem('vpsglass_vms');
        if (stored) {
            try {
                vmDatabase = JSON.parse(stored);
                vmDatabase.forEach(v => { v.expanded = false; });
                renderVMList();
                vmDatabase.forEach(v => startTimerForVM(v.id));
            } catch(e) { vmDatabase = []; }
        }
    }

    function renderVMList() {
        const container = document.getElementById('vmList');
        if (!container) return;
        if (vmDatabase.length === 0) {
            container.innerHTML = '<div class="empty-state">✨ Chưa có VM nào<br>Bấm "Tự động tạo repo + Deploy VM"</div>';
            return;
        }
        let html = '';
        for (let vm of vmDatabase) {
            const isWin = vm.name.includes('Windows');
            html += `
                <div class="vm-card ${vm.expanded ? 'expanded' : ''}" onclick="toggleExpand('${vm.id}')">
                    <div class="vm-header">
                        <div class="vm-os"><span>${isWin ? '🪟' : '🐧'}</span> ${escapeHtml(vm.name)}</div>
                        <div class="vm-timer" id="timer-${vm.id}">${formatTime(getRemainingSec(vm))}</div>
                    </div>
                    <div class="vm-info">
                        <span>${isWin ? 'RDP' : 'SSH'}: ${escapeHtml(vm.ip)}</span>
                        <span>👤 ${escapeHtml(vm.user)}</span>
                    </div>
                    <div class="vm-detail">
                        <div class="detail-row">
                            <div>🌍 IP: <b>${escapeHtml(vm.ip)}</b></div>
                            <div>🔑 Pass: <b>${escapeHtml(vm.password)}</b></div>
                        </div>
                        <button class="btn-delete" onclick="event.stopPropagation(); removeVM('${vm.id}')">🗑️ Xóa VM</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        vmDatabase.forEach(vm => updateTimerUI(vm.id));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Khôi phục dữ liệu
    window.onload = () => {
        loadVMFromLocal();
        const savedToken = localStorage.getItem('gh_token');
        if (savedToken) document.getElementById('github_token').value = savedToken;
        setInterval(() => {
            for (let vm of vmDatabase) {
                if (getRemainingSec(vm) <= 0) removeVM(vm.id);
            }
        }, 5000);
    };

    window.setupAndDeploy = setupAndDeploy;
    window.createVM = createVM;
    window.removeVM = removeVM;
    window.toggleExpand = toggleExpand;
</script>
</body>
</html>
