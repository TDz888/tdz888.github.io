<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🚀 VM GENERATOR · Tạo VPS Miễn Phí</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0c0f1c 0%, #0a0d18 100%);
            font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
            padding: 28px 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #FFB347, #FF8C00, #FF6B00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 140, 0, 0.15);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #FFB347;
            margin-top: 8px;
        }

        /* Layout 2 cột */
        .dashboard {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .panel-left {
            flex: 1;
            min-width: 320px;
        }

        .panel-right {
            flex: 1.8;
            min-width: 420px;
        }

        /* Card chính */
        .card {
            background: rgba(18, 22, 40, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 140, 0, 0.15);
            padding: 28px;
            margin-bottom: 24px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .card:hover {
            border-color: rgba(255, 140, 0, 0.35);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #FFD6A5;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 3px solid #FF8C00;
            padding-left: 16px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #B8C4E6;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(8, 12, 24, 0.8);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 28px;
            font-size: 0.9rem;
            color: white;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #FF8C00;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.15);
        }

        /* Nút bấm mềm mại */
        button {
            background: linear-gradient(105deg, #FF8C00, #E66A00);
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.35);
            background: linear-gradient(105deg, #FF9A20, #FF7700);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 140, 0, 0.5);
            box-shadow: none;
            color: #FFB347;
        }

        .btn-outline:hover {
            background: rgba(255, 140, 0, 0.1);
            transform: translateY(-2px);
        }

        /* Status */
        .status-badge {
            margin-top: 14px;
            padding: 10px 16px;
            border-radius: 32px;
            display: none;
            font-size: 0.75rem;
            text-align: center;
        }

        .status-badge.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-badge.success {
            background: rgba(60, 200, 120, 0.15);
            border: 1px solid rgba(60, 200, 120, 0.5);
            color: #AAFFD0;
        }

        .status-badge.error {
            background: rgba(255, 70, 90, 0.15);
            border: 1px solid #FF7070;
            color: #FFC0C0;
        }

        .status-badge.loading {
            background: rgba(255, 140, 0, 0.15);
            border: 1px solid #FFB347;
            color: #FFE2B5;
        }

        /* VM List Grid */
        .vm-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .vm-grid::-webkit-scrollbar {
            width: 5px;
        }

        .vm-grid::-webkit-scrollbar-track {
            background: rgba(255, 140, 0, 0.08);
            border-radius: 10px;
        }

        .vm-grid::-webkit-scrollbar-thumb {
            background: #FF8C00;
            border-radius: 10px;
        }

        /* VM Box */
        .vm-box {
            background: linear-gradient(135deg, rgba(20, 25, 45, 0.8), rgba(15, 18, 35, 0.9));
            border-radius: 28px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        .vm-box:hover {
            transform: translateX(6px);
            border-color: rgba(255, 140, 0, 0.5);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .vm-box.active {
            border-color: #FF8C00;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.12), rgba(20, 25, 45, 0.9));
            box-shadow: 0 0 0 2px rgba(255, 140, 0, 0.2);
        }

        .vm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .vm-name {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #FFD6A5, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vm-timer {
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #FFE5A3;
            letter-spacing: 0.5px;
        }

        .vm-preview {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: #9CA8D4;
            margin-bottom: 8px;
        }

        /* Thông tin chi tiết (hiện khi click) */
        .vm-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            margin-top: 0;
        }

        .vm-box.expanded .vm-details {
            max-height: 260px;
            margin-top: 16px;
            padding: 16px;
        }

        .detail-row {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 10px;
        }

        .detail-row span {
            color: #FFB347;
        }

        .vm-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .btn-sm {
            background: rgba(255, 140, 0, 0.2);
            border: 0.5px solid rgba(255, 140, 0, 0.5);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            width: auto;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-sm:hover {
            background: rgba(255, 140, 0, 0.35);
            transform: translateY(-1px);
        }

        .btn-sm-danger {
            background: rgba(255, 80, 100, 0.2);
            border-color: rgba(255, 80, 100, 0.5);
            color: #FFB8C0;
        }

        .btn-sm-danger:hover {
            background: rgba(255, 80, 100, 0.35);
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: #7A86B0;
            background: rgba(18, 22, 40, 0.5);
            border-radius: 32px;
            border: 1px dashed rgba(255, 140, 0, 0.3);
        }

        footer {
            text-align: center;
            margin-top: 32px;
            padding: 20px;
            color: #5A6690;
            font-size: 0.7rem;
            border-top: 1px solid rgba(255, 140, 0, 0.1);
        }

        @media (max-width: 900px) {
            body {
                padding: 16px;
            }
            .dashboard {
                flex-direction: column;
            }
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🚀 VM GENERATOR 🚀</h1>
        <div class="badge">⚡ Tạo VPS Miễn Phí · GitHub Actions · noVNC</div>
    </div>

    <div class="dashboard">
        <!-- Cột trái: Tạo VPS -->
        <div class="panel-left">
            <div class="card">
                <div class="card-title">
                    <span>✨</span> Tạo VPS
                </div>
                <div class="form-group">
                    <label>🔑 GITHUB TOKEN</label>
                    <input type="password" id="github_token" placeholder="ghp_xxx hoặc github_pat_xxx">
                </div>
                <button onclick="setupAndDeploy()" id="setupBtn">🚀 Tạo Repo + Deploy</button>
                <div id="setupStatus" class="status-badge"></div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span>⚙️</span> Cấu hình VM
                </div>
                <div class="form-group">
                    <label>⏱️ Thời gian sống</label>
                    <select id="duration">
                        <option value="60">1 giờ</option>
                        <option value="120" selected>2 giờ</option>
                        <option value="240">4 giờ</option>
                        <option value="330">5.5 giờ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💿 Hệ điều hành</label>
                    <select id="target_os">
                        <option value="windows">🪟 Windows Server (GUI + noVNC)</option>
                        <option value="ubuntu">🐧 Ubuntu 22.04 (SSH)</option>
                    </select>
                </div>
                <button onclick="createVM()" id="deployBtn">💨 Tạo VPS Ngay</button>
                <div id="deployStatus" class="status-badge"></div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span>🔄</span> Quản lý
                </div>
                <button onclick="refreshVMList()" class="btn-outline" id="refreshBtn">🔄 Làm mới danh sách</button>
            </div>
        </div>

        <!-- Cột phải: Danh sách VM -->
        <div class="panel-right">
            <div class="card">
                <div class="card-title">
                    <span>📡</span> Danh sách VPS đang chạy
                </div>
                <div id="vmListContainer" class="vm-grid">
                    <div class="empty-state">
                        ✨ Chưa có VPS nào<br>
                        Nhấn "Tạo Repo + Deploy" để bắt đầu
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer>
        Developed by <strong style="color:#FFB347;">TDz888</strong> · Based on DuckNoVis Technology · Tự động thu hồi sau hết giờ
    </footer>
</div>

<script>
    // ======================= CONFIG =======================
    const API_BASE = '/api';
    let vmDatabase = [];
    let activeVMId = null;

    // ======================= UTILS =======================
    function showStatus(elementId, msg, type) {
        const el = document.getElementById(elementId);
        if (!el) return;
        el.className = `status-badge show ${type}`;
        el.innerHTML = msg;
        setTimeout(() => el.classList.remove('show'), 5000);
    }

    async function callApi(endpoint, data) {
        try {
            const res = await fetch(`${API_BASE}/${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await res.json();
        } catch (err) {
            return { error: err.message };
        }
    }

    function refreshVMList() {
        renderVMList();
        showStatus('setupStatus', 'Đã làm mới danh sách', 'success');
    }

    // ======================= GITHUB API =======================
    async function setupAndDeploy() {
        const token = document.getElementById('github_token').value.trim();
        if (!token) {
            alert('Vui lòng nhập GitHub Token');
            return;
        }

        showStatus('setupStatus', '🔄 Đang kiểm tra token và tạo repo...', 'loading');
        document.getElementById('setupBtn').disabled = true;

        try {
            const result = await callApi('create-repo', { token });
            if (result.error) throw new Error(result.error);
            
            localStorage.setItem('gh_token', token);
            localStorage.setItem('gh_owner', result.owner);
            localStorage.setItem('gh_repo', result.repo);
            
            showStatus('setupStatus', `✅ Thành công! Repo: ${result.repo}`, 'success');
            setTimeout(() => createVM(), 1000);
            
        } catch (err) {
            showStatus('setupStatus', `❌ Lỗi: ${err.message}`, 'error');
        } finally {
            document.getElementById('setupBtn').disabled = false;
        }
    }

    async function createVM() {
        let token = localStorage.getItem('gh_token');
        let owner = localStorage.getItem('gh_owner');
        let repo = localStorage.getItem('gh_repo');
        
        if (!token || !owner || !repo) {
            const freshToken = document.getElementById('github_token').value.trim();
            if (!freshToken) {
                alert('Cần nhập GitHub Token và chạy "Tạo Repo + Deploy" trước');
                return;
            }
            await setupAndDeploy();
            return;
        }
        
        const duration = document.getElementById('duration').value;
        const target_os = document.getElementById('target_os').value;
        
        showStatus('deployStatus', '🚀 Đang gửi yêu cầu tạo VPS...', 'loading');
        document.getElementById('deployBtn').disabled = true;
        
        try {
            const result = await callApi('deploy-vm', {
                token, owner, repo, duration, target_os, tailscale_token: ''
            });
            if (result.error) throw new Error(result.error);
            
            const osName = target_os === 'windows' ? 'Windows Server' : 'Ubuntu 22.04';
            addVM({
                name: osName,
                ip: 'Đang khởi tạo...',
                user: 'Đang khởi tạo...',
                pass: 'Đang khởi tạo...',
                duration: parseInt(duration)
            });
            
            showStatus('deployStatus', '✅ VPS đang được tạo (2-3 phút sau có thông tin)', 'success');
            
        } catch (err) {
            showStatus('deployStatus', `❌ Lỗi: ${err.message}`, 'error');
        } finally {
            document.getElementById('deployBtn').disabled = false;
        }
    }

    // ======================= VM MANAGEMENT =======================
    function addVM(vm) {
        const newVM = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            name: vm.name,
            ip: vm.ip,
            user: vm.user,
            password: vm.pass,
            durationMinutes: vm.duration,
            createdAt: Date.now(),
            expanded: false
        };
        vmDatabase.push(newVM);
        saveVMToLocal();
        renderVMList();
        startTimerForVM(newVM.id);
    }

    function removeVM(id) {
        vmDatabase = vmDatabase.filter(v => v.id !== id);
        if (activeVMId === id) activeVMId = null;
        saveVMToLocal();
        renderVMList();
    }

    function toggleExpand(id) {
        const vm = vmDatabase.find(v => v.id === id);
        if (vm) {
            vm.expanded = !vm.expanded;
            if (vm.expanded) activeVMId = id;
            else if (activeVMId === id) activeVMId = null;
            renderVMList();
        }
    }

    function getRemainingSec(vm) {
        const elapsed = (Date.now() - vm.createdAt) / 1000;
        const remain = vm.durationMinutes * 60 - elapsed;
        return remain > 0 ? remain : 0;
    }

    function formatTime(sec) {
        if (sec <= 0) return 'Hết hạn';
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = Math.floor(sec % 60);
        if (h > 0) return `${h}h ${m}m ${s}s`;
        if (m > 0) return `${m}m ${s}s`;
        return `${s}s`;
    }

    function formatDate(timestamp) {
        const d = new Date(timestamp);
        return d.toLocaleString('vi-VN');
    }

    function updateTimerUI(id) {
        const vm = vmDatabase.find(v => v.id === id);
        if (!vm) return;
        const remain = getRemainingSec(vm);
        const timerEl = document.getElementById(`timer-${id}`);
        if (timerEl) {
            if (remain <= 0) {
                timerEl.innerHTML = 'Hết hạn';
                setTimeout(() => removeVM(id), 2000);
            } else {
                timerEl.innerHTML = formatTime(remain);
            }
        }
    }

    function startTimerForVM(id) {
        setInterval(() => updateTimerUI(id), 1000);
    }

    function saveVMToLocal() {
        const toStore = vmDatabase.map(v => ({
            id: v.id, name: v.name, ip: v.ip, user: v.user, password: v.password,
            durationMinutes: v.durationMinutes, createdAt: v.createdAt, expanded: false
        }));
        localStorage.setItem('vmgenerator_vms', JSON.stringify(toStore));
    }

    function loadVMFromLocal() {
        const stored = localStorage.getItem('vmgenerator_vms');
        if (stored) {
            try {
                vmDatabase = JSON.parse(stored);
                vmDatabase.forEach(v => { v.expanded = false; });
                renderVMList();
                vmDatabase.forEach(v => startTimerForVM(v.id));
            } catch(e) { vmDatabase = []; }
        }
    }

    function renderVMList() {
        const container = document.getElementById('vmListContainer');
        if (!container) return;
        
        if (vmDatabase.length === 0) {
            container.innerHTML = '<div class="empty-state">✨ Chưa có VPS nào<br>Nhấn "Tạo Repo + Deploy" để bắt đầu</div>';
            return;
        }
        
        let html = '';
        for (let vm of vmDatabase) {
            const isWin = vm.name.includes('Windows');
            const expandedClass = vm.expanded ? 'expanded' : '';
            const isActive = (activeVMId === vm.id);
            
            html += `
                <div class="vm-box ${expandedClass} ${isActive ? 'active' : ''}" onclick="toggleExpand('${vm.id}')">
                    <div class="vm-header">
                        <div class="vm-name">
                            <span>${isWin ? '🪟' : '🐧'}</span> ${escapeHtml(vm.name)}
                        </div>
                        <div class="vm-timer" id="timer-${vm.id}">${formatTime(getRemainingSec(vm))}</div>
                    </div>
                    <div class="vm-preview">
                        <span>🌍 IP: ${escapeHtml(vm.ip)}</span>
                        <span>👤 User: ${escapeHtml(vm.user)}</span>
                    </div>
                    <div class="vm-details">
                        <div class="detail-row">
                            <div>🔗 IP: <span>${escapeHtml(vm.ip)}</span></div>
                            <div>🔌 Port: <span>${isWin ? '3389 (RDP) / 6080 (noVNC)' : '22 (SSH)'}</span></div>
                        </div>
                        <div class="detail-row">
                            <div>👤 Username: <span>${escapeHtml(vm.user)}</span></div>
                            <div>🔑 Password: <span>${escapeHtml(vm.password)}</span></div>
                        </div>
                        <div class="detail-row">
                            <div>⏰ Thời gian tạo: <span>${formatDate(vm.createdAt)}</span></div>
                            <div>⏱️ Hết hạn sau: <span>${formatTime(getRemainingSec(vm))}</span></div>
                        </div>
                        <div class="vm-actions">
                            <button class="btn-sm" onclick="event.stopPropagation(); copyInfo('${vm.id}')">📋 Copy thông tin</button>
                            <button class="btn-sm btn-sm-danger" onclick="event.stopPropagation(); removeVM('${vm.id}')">🗑️ Xóa VPS</button>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        vmDatabase.forEach(vm => updateTimerUI(vm.id));
    }

    function copyInfo(id) {
        const vm = vmDatabase.find(v => v.id === id);
        if (!vm) return;
        const info = `IP: ${vm.ip}\nUser: ${vm.user}\nPassword: ${vm.password}\nPort: ${vm.name.includes('Windows') ? '3389' : '22'}`;
        navigator.clipboard.writeText(info);
        showStatus('deployStatus', '📋 Đã copy thông tin kết nối', 'success');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ======================= INIT =======================
    window.onload = () => {
        loadVMFromLocal();
        const savedToken = localStorage.getItem('gh_token');
        if (savedToken) document.getElementById('github_token').value = savedToken;
        
        setInterval(() => {
            for (let vm of vmDatabase) {
                if (getRemainingSec(vm) <= 0) removeVM(vm.id);
            }
        }, 5000);
    };

    window.setupAndDeploy = setupAndDeploy;
    window.createVM = createVM;
    window.removeVM = removeVM;
    window.toggleExpand = toggleExpand;
    window.refreshVMList = refreshVMList;
    window.copyInfo = copyInfo;
</script>
</body>
</html>
