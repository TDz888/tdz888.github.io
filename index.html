<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Neural VM Pro - Ảo hóa cao cấp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0b0f1c, #020408);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Glass card */
        .card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 255, 200, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.2s;
        }

        .card:hover {
            border-color: rgba(0, 255, 150, 0.6);
            box-shadow: 0 8px 25px rgba(0, 255, 150, 0.1);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #aaffdd, #00ffaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #8a9ccc;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #7effd4;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #0affb3;
            padding-left: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: #cfecff;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid #2a4c6e;
            background: rgba(0, 0, 0, 0.55);
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: #0affb3;
            box-shadow: 0 0 6px rgba(10, 255, 179, 0.4);
        }

        button {
            background: linear-gradient(95deg, #00cc88, #0099ff);
            color: #010b14;
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,255,150,0.2);
        }

        button:hover {
            transform: scale(0.98);
            filter: brightness(1.05);
            box-shadow: 0 4px 14px rgba(0,255,150,0.4);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
        }

        .status {
            margin-top: 18px;
            padding: 12px;
            border-radius: 24px;
            display: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: rgba(0, 255, 150, 0.15);
            border: 1px solid #0affb3;
            color: #b2ffd9;
        }

        .status.error {
            background: rgba(255, 70, 70, 0.15);
            border: 1px solid #ff5a5a;
            color: #ffb3b3;
        }

        .status.loading {
            background: rgba(255, 170, 0, 0.12);
            border: 1px solid #ffaa33;
            color: #ffdd99;
        }

        .info-text {
            color: #8aa2c9;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .badge {
            background: #0affb3;
            color: #041f1a;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-right: 8px;
        }

        .vm-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 8px;
        }

        .vm-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 18px;
            border-left: 4px solid #0affb3;
            transition: 0.2s;
        }

        .vm-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .vm-title {
            font-weight: bold;
            color: #e0fffa;
            font-size: 1.1rem;
        }

        .timer {
            font-family: monospace;
            background: #0b1424;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #ffd966;
            font-weight: bold;
        }

        .vm-detail {
            background: #03080f60;
            border-radius: 20px;
            padding: 12px;
            margin: 10px 0;
            font-size: 0.8rem;
            font-family: monospace;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .vm-detail span {
            color: #9bc4ff;
        }

        .vm-detail b {
            color: #d0ffec;
        }

        .delete-vm {
            background: rgba(255, 80, 80, 0.2);
            color: #ff9e9e;
            border: 1px solid #ff7070;
            margin-top: 8px;
            font-size: 0.75rem;
            padding: 8px;
            border-radius: 30px;
            width: auto;
            display: inline-block;
        }

        .delete-vm:hover {
            background: rgba(255, 60, 60, 0.5);
            color: white;
        }

        .empty-vms {
            text-align: center;
            color: #6a7c9e;
            padding: 24px;
            font-style: italic;
        }

        .flex-btns {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }

        footer {
            text-align: center;
            color: #3a4b6e;
            font-size: 0.7rem;
            padding: 16px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 560px) {
            .card {
                padding: 18px;
            }
            .vm-detail {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🧠 NEURAL VM PRO</h1>
        <p class="subtitle">Tạo máy chủ ảo siêu tốc · Quản lý thông minh</p>
    </div>

    <!-- Cấu hình GitHub + Tailscale -->
    <div class="card">
        <h2>🔐 CẤU HÌNH NỀN TẢNG</h2>
        <div class="form-group">
            <label>🔑 GitHub Token (classic)</label>
            <input type="password" id="github_token" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="form-group">
            <label>👤 GitHub Username</label>
            <input type="text" id="github_owner" placeholder="username">
        </div>
        <div class="form-group">
            <label>📁 Repository name</label>
            <input type="text" id="github_repo" placeholder="neural-vm-host">
        </div>
        <div class="form-group">
            <label>🔌 Tailscale Token (tùy chọn, tự động lưu)</label>
            <input type="password" id="tailscale_token" placeholder="tskey-xxxx">
            <div class="info-text">🌐 Nhập để tích hợp mạng riêng, không bắt buộc</div>
        </div>
        <button onclick="saveFullConfig()">💾 LƯU TOÀN BỘ CẤU HÌNH</button>
    </div>

    <!-- Tạo VM mới -->
    <div class="card">
        <h2>⚙️ TẠO MÁY CHỦ MỚI</h2>
        <div class="form-group">
            <label>⏱️ Thời gian sống</label>
            <select id="duration">
                <option value="30m">30 phút</option>
                <option value="1h">1 giờ</option>
                <option value="2h" selected>2 giờ</option>
                <option value="4h">4 giờ</option>
                <option value="6h">6 giờ</option>
            </select>
        </div>
        <div class="form-group">
            <label>💿 Hệ điều hành</label>
            <select id="target_os">
                <option value="windows">🪟 Windows 11</option>
                <option value="ubuntu22">🐧 Ubuntu 22.04</option>
                <option value="ubuntu24">🐧 Ubuntu 24.04</option>
                <option value="debian">🐍 Debian 12</option>
                <option value="centos">📦 CentOS 9</option>
                <option value="almalinux">🔷 AlmaLinux 9</option>
                <option value="all">🚀 Tất cả (6 máy)</option>
            </select>
        </div>
        <button onclick="deployVM()" id="deployBtn">🚀 TẠO MÁY CHỦ NGAY</button>
        <div id="status" class="status"></div>
    </div>

    <!-- DANH SÁCH VM ĐANG HOẠT ĐỘNG + BỘ ĐẾM -->
    <div class="card">
        <h2>📡 MÁY CHỦ ĐANG CHẠY</h2>
        <div id="vmListContainer" class="vm-list">
            <div class="empty-vms">✨ Chưa có VM nào, bấm "Tạo máy chủ" để bắt đầu</div>
        </div>
    </div>

    <footer>
        Neural VM Pro · Tự động xóa VM khi hết giờ · Dữ liệu lưu trên trình duyệt
    </footer>
</div>

<script>
    // ---------- CẤU HÌNH LƯU TRỮ ----------
    let vmDatabase = []; // mỗi vm: { id, name, ip, user, password, createdAt, durationMinutes, targetOS, timerInterval, tailscaleIP? }

    function saveFullConfig() {
        const token = document.getElementById('github_token').value;
        const owner = document.getElementById('github_owner').value;
        const repo = document.getElementById('github_repo').value;
        const tailToken = document.getElementById('tailscale_token').value;
        if (token && owner && repo) {
            localStorage.setItem('github_token', token);
            localStorage.setItem('github_owner', owner);
            localStorage.setItem('github_repo', repo);
            localStorage.setItem('tailscale_token', tailToken);
            showToastStatus('✅ Đã lưu cấu hình GitHub & Tailscale', 'success');
        } else {
            alert('⚠️ Vui lòng nhập ít nhất GitHub Token, Owner và Repo');
        }
    }

    function loadSavedConfig() {
        const token = localStorage.getItem('github_token');
        const owner = localStorage.getItem('github_owner');
        const repo = localStorage.getItem('github_repo');
        const tailToken = localStorage.getItem('tailscale_token');
        if (token) document.getElementById('github_token').value = token;
        if (owner) document.getElementById('github_owner').value = owner;
        if (repo) document.getElementById('github_repo').value = repo;
        if (tailToken) document.getElementById('tailscale_token').value = tailToken;
    }

    // Quản lý VM trong localStorage + hiển thị + timer
    function loadVMsFromStorage() {
        const stored = localStorage.getItem('neural_vm_list');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                vmDatabase = parsed.map(vm => {
                    // khôi phục lại timer sau khi load
                    return {
                        ...vm,
                        timerInterval: null,
                    };
                });
            } catch(e) { vmDatabase = []; }
        } else {
            vmDatabase = [];
        }
        renderVMList();
        startAllTimers();
    }

    function saveVMsToStorage() {
        // lưu trước khi lưu thì loại bỏ interval để tránh lưu hàm
        const toStore = vmDatabase.map(vm => {
            const { timerInterval, ...cleanVm } = vm;
            return cleanVm;
        });
        localStorage.setItem('neural_vm_list', JSON.stringify(toStore));
    }

    function addVM(vmInfo) {
        // vmInfo: { name, ip, user, password, durationMinutes, targetOS, tailscaleIP? }
        const now = Date.now();
        const newVM = {
            id: 'vm_' + Date.now() + '_' + Math.floor(Math.random() * 10000),
            name: vmInfo.name || `VM-${vmDatabase.length+1}`,
            ip: vmInfo.ip,
            user: vmInfo.user,
            password: vmInfo.password,
            tailscaleIP: vmInfo.tailscaleIP || null,
            createdAt: now,
            durationMinutes: vmInfo.durationMinutes,
            targetOS: vmInfo.targetOS,
            timerInterval: null
        };
        vmDatabase.push(newVM);
        saveVMsToStorage();
        renderVMList();
        startTimerForVM(newVM.id);
        return newVM;
    }

    function removeVMById(vmId) {
        const index = vmDatabase.findIndex(v => v.id === vmId);
        if (index !== -1) {
            if (vmDatabase[index].timerInterval) clearInterval(vmDatabase[index].timerInterval);
            vmDatabase.splice(index, 1);
            saveVMsToStorage();
            renderVMList();
            startAllTimers(); // refresh timer
            showToastStatus('🗑️ Đã xóa VM khỏi danh sách', 'success');
        }
    }

    function getRemainingSeconds(vm) {
        const elapsed = (Date.now() - vm.createdAt) / 1000;
        const totalSec = vm.durationMinutes * 60;
        const remaining = totalSec - elapsed;
        return remaining > 0 ? remaining : 0;
    }

    function formatTime(seconds) {
        if (seconds <= 0) return "Đã hết hạn";
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        if (hrs > 0) return `${hrs}h ${mins}m ${secs}s`;
        if (mins > 0) return `${mins}m ${secs}s`;
        return `${secs}s`;
    }

    function updateTimerDisplay(vmId) {
        const vm = vmDatabase.find(v => v.id === vmId);
        if (!vm) return;
        const remainingSec = getRemainingSeconds(vm);
        const timerElement = document.getElementById(`timer-${vmId}`);
        if (timerElement) {
            if (remainingSec <= 0) {
                timerElement.innerText = "⏰ Hết hạn";
                timerElement.style.color = "#ff8888";
                // tự động xóa VM khỏi danh sách khi hết hạn
                if (remainingSec <= 0 && !vm._markedExpired) {
                    vm._markedExpired = true;
                    setTimeout(() => {
                        if (vmDatabase.find(v => v.id === vmId)) {
                            showToastStatus(`⚠️ VM ${vm.name} đã hết hạn, tự động xóa`, 'error');
                            removeVMById(vmId);
                        }
                    }, 1000);
                }
            } else {
                timerElement.innerText = `⏳ ${formatTime(remainingSec)}`;
                timerElement.style.color = "#ffd966";
            }
        }
    }

    function startTimerForVM(vmId) {
        const vm = vmDatabase.find(v => v.id === vmId);
        if (!vm) return;
        if (vm.timerInterval) clearInterval(vm.timerInterval);
        const interval = setInterval(() => {
            updateTimerDisplay(vmId);
        }, 1000);
        vm.timerInterval = interval;
        updateTimerDisplay(vmId);
    }

    function startAllTimers() {
        vmDatabase.forEach(vm => {
            if (vm.timerInterval) clearInterval(vm.timerInterval);
            startTimerForVM(vm.id);
        });
    }

    function renderVMList() {
        const container = document.getElementById('vmListContainer');
        if (!container) return;
        if (vmDatabase.length === 0) {
            container.innerHTML = '<div class="empty-vms">💡 Chưa có máy chủ nào. Nhấn "Tạo máy chủ" để khởi tạo VM ảo.</div>';
            return;
        }

        let html = '';
        vmDatabase.forEach(vm => {
            const remainingSec = getRemainingSeconds(vm);
            const expiredClass = remainingSec <= 0 ? 'timer-expired' : '';
            const tailInfo = vm.tailscaleIP ? `🌐 Tailscale IP: ${vm.tailscaleIP}` : '🔒 Chưa có Tailscale';
            html += `
                <div class="vm-card" data-id="${vm.id}">
                    <div class="vm-header">
                        <div class="vm-title">🖥️ ${escapeHtml(vm.name)} (${vm.targetOS})</div>
                        <div class="timer ${expiredClass}" id="timer-${vm.id}">--:--</div>
                    </div>
                    <div class="vm-detail">
                        <div>📍 IP: <b>${escapeHtml(vm.ip)}</b></div>
                        <div>👤 User: <b>${escapeHtml(vm.user)}</b></div>
                        <div>🔑 Pass: <b>${escapeHtml(vm.password)}</b></div>
                        <div>${tailInfo}</div>
                    </div>
                    <div class="flex-btns">
                        <button class="delete-vm" onclick="removeVMById('${vm.id}')">🗑️ Xóa VM & dừng đếm</button>
                    </div>
                    <div class="info-text">📌 Kết nối RDP: ${vm.ip}:3389 (Windows) hoặc SSH (Linux)</div>
                </div>
            `;
        });
        container.innerHTML = html;
        // cập nhật lại timer sau render
        vmDatabase.forEach(vm => updateTimerDisplay(vm.id));
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function showToastStatus(message, type) {
        const statusDiv = document.getElementById('status');
        if (!statusDiv) return;
        statusDiv.className = `status show ${type}`;
        statusDiv.innerHTML = message;
        setTimeout(() => {
            if (statusDiv) statusDiv.classList.remove('show');
        }, 4000);
    }

    // Mô phỏng nhận thông tin VM từ GitHub Actions (demo thực tế)
    // Vì không có backend thật, chúng ta sẽ tạo dữ liệu giả lập từ GitHub dispatch nhưng hiển thị IP ngẫu nhiên chân thực
    // Trong môi trường thật, bạn sẽ parse từ Actions log. Ở đây, sau khi dispatch thành công, mô phỏng VM được tạo sau 5 giây với thông tin động.
    async function deployVM() {
        const token = document.getElementById('github_token').value;
        const owner = document.getElementById('github_owner').value;
        const repo = document.getElementById('github_repo').value;
        const durationRaw = document.getElementById('duration').value;
        const target_os = document.getElementById('target_os').value;
        const tailscaleToken = document.getElementById('tailscale_token').value;

        if (!token || !owner || !repo) {
            alert('✗ Vui lòng cấu hình GitHub đầy đủ trước!');
            return;
        }

        // lưu lại tailscale token nếu có
        if(tailscaleToken) localStorage.setItem('tailscale_token', tailscaleToken);

        const statusDiv = document.getElementById('status');
        const deployBtn = document.getElementById('deployBtn');
        statusDiv.className = 'status show loading';
        statusDiv.innerHTML = '<span class="spinner"></span> Đang gửi yêu cầu tạo VM tới GitHub Actions...';
        deployBtn.disabled = true;

        // parse duration phút
        let durationMinutes = 120;
        if (durationRaw === '30m') durationMinutes = 30;
        else if (durationRaw === '1h') durationMinutes = 60;
        else if (durationRaw === '2h') durationMinutes = 120;
        else if (durationRaw === '4h') durationMinutes = 240;
        else if (durationRaw === '6h') durationMinutes = 360;

        try {
            const url = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/deploy-vm.yml/dispatches`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: {
                        duration: durationRaw,
                        target_os: target_os,
                        tailscale_token: tailscaleToken || ''
                    }
                })
            });

            if (response.ok) {
                statusDiv.className = 'status show success';
                statusDiv.innerHTML = '✓ Đã kích hoạt workflow! Sau 2-3 phút, VM sẽ sẵn sàng. Thông tin sẽ hiển thị bên dưới (mô phỏng).';

                // Mô phỏng nhận thông tin từ GitHub Actions sau 5 giây (demo)
                // Trong thực tế, bạn cần lấy từ API run hoặc webhook. Ở đây tạo fake data để trải nghiệm đếm ngược + quản lý.
                setTimeout(() => {
                    // Tạo thông tin IP, user, pass giả lập dựa trên OS
                    const fakeIP = `10.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
                    const fakeUser = `vmuser_${Math.floor(Math.random()*9000+1000)}`;
                    const fakePass = `P@ssw0rd${Math.floor(Math.random()*10000)}`;
                    const tailFake = tailscaleToken ? `100.${Math.floor(Math.random()*100)}.${Math.floor(Math.random()*100)}.${Math.floor(Math.random()*100)}` : null;
                    let osLabel = target_os;
                    if(target_os === 'windows') osLabel = 'Windows 11';
                    else if(target_os === 'ubuntu22') osLabel = 'Ubuntu 22.04';
                    else if(target_os === 'ubuntu24') osLabel = 'Ubuntu 24.04';
                    else if(target_os === 'debian') osLabel = 'Debian 12';
                    else if(target_os === 'centos') osLabel = 'CentOS 9';
                    else if(target_os === 'almalinux') osLabel = 'AlmaLinux 9';
                    else if(target_os === 'all') osLabel = 'Multi-VM (6 máy) - Demo 1 đại diện';

                    addVM({
                        name: `VM-${osLabel}`,
                        ip: fakeIP,
                        user: fakeUser,
                        password: fakePass,
                        durationMinutes: durationMinutes,
                        targetOS: osLabel,
                        tailscaleIP: tailFake
                    });
                    showToastStatus(`✨ VM đã được thêm vào danh sách! IP: ${fakeIP}`, 'success');
                }, 5000);
            } else {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status} - ${errText.slice(0,100)}`);
            }
        } catch (error) {
            statusDiv.className = 'status show error';
            statusDiv.innerHTML = `✗ Lỗi khi tạo VM: ${error.message}. Kiểm tra token, workflow hoặc repo.`;
        } finally {
            deployBtn.disabled = false;
            setTimeout(() => {
                if(statusDiv.classList.contains('show')) statusDiv.classList.remove('show');
            }, 8000);
        }
    }

    // Thêm chức năng thủ công nếu muốn thêm VM demo (test)
    window.removeVMById = removeVMById;
    window.deployVM = deployVM;
    window.saveFullConfig = saveFullConfig;

    // Khởi tạo
    window.onload = () => {
        loadSavedConfig();
        loadVMsFromStorage();
        // kiểm tra timer xóa nếu có VM hết hạn lúc khởi động
        setInterval(() => {
            vmDatabase.forEach(vm => {
                if(getRemainingSeconds(vm) <= 0) {
                    removeVMById(vm.id);
                }
            });
        }, 5000);
    };
</script>
</body>
</html>
