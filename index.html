<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VPS Glass · noVNC + Tailscale · iOS 26 Liquid</title>
    <style>
        /* (Toàn bộ CSS giống như tôi đã viết ở phần trước - giao diện glass, hiệu ứng bồng bềnh) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, #0f1422, #05070d);
            font-family: -apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        /* ... (copy toàn bộ CSS từ câu trả lời trước của tôi) ... */
        /* Lưu ý: Tôi sẽ gửi lại file HTML hoàn chỉnh qua chat nếu bạn cần, nhưng trong hướng dẫn này tôi tập trung vào backend */
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-header">
            <h1>🧊 VPS GLASS · iOS 26 Liquid</h1>
            <p>noVNC · Tailscale · RDP · Bồng bềnh như mây</p>
        </div>
        <div class="dashboard">
            <!-- Cột trái: Cấu hình -->
            <div class="panel-config">
                <div class="glass-card">
                    <div class="card-header"><div class="icon-bg">🔐</div><h2>GitHub Token</h2></div>
                    <input type="password" id="github_token" placeholder="ghp_xxx hoặc github_pat_xxx">
                    <button onclick="setupAndDeploy()" id="setupBtn">✨ Tạo repo + Deploy</button>
                    <div id="setupStatus" class="status-badge"></div>
                </div>
                <div class="glass-card">
                    <div class="card-header"><div class="icon-bg">⚙️</div><h2>Tạo VM mới</h2></div>
                    <div class="form-group"><label>⏱️ Thời gian sống</label><select id="duration"><option value="60">1 giờ</option><option value="120" selected>2 giờ</option><option value="240">4 giờ</option><option value="360">6 giờ</option></select></div>
                    <div class="form-group"><label>💿 Hệ điều hành</label><select id="target_os"><option value="windows">🪟 Windows 11 (RDP)</option><option value="ubuntu">🐧 Ubuntu 22.04 (SSH)</option></select></div>
                    <button onclick="createVM()" id="deployBtn">💨 Tạo VM ngay</button>
                    <div id="deployStatus" class="status-badge"></div>
                </div>
                <div class="glass-card">
                    <div class="card-header"><div class="icon-bg">🔗</div><h2>Tailscale (RDP/SSH)</h2></div>
                    <input type="password" id="tailscale_token" placeholder="tskey-auth-xxx">
                    <button onclick="saveTailscaleToken()">💾 Lưu token</button>
                    <div class="tailscale-status" id="tailscaleStatus"></div>
                </div>
            </div>
            <!-- Cột giữa: Danh sách VM -->
            <div class="panel-vms">
                <div class="glass-card">
                    <div class="card-header"><div class="icon-bg">🖥️</div><h2>Máy chủ đang chạy</h2></div>
                    <div id="vmList" class="vm-scroll">✨ Chưa có VM nào</div>
                </div>
            </div>
            <!-- Cột phải: noVNC -->
            <div class="panel-novnc">
                <div class="glass-card">
                    <div class="card-header"><div class="icon-bg">🖥️</div><h2>noVNC · Xem màn hình</h2></div>
                    <div class="novnc-container" id="novncContainer">⚡ Chọn VM để kết nối</div>
                    <div class="connect-guide" id="rdpGuide" style="display:none;"></div>
                </div>
            </div>
        </div>
        <footer>Liquid Glass Engine · noVNC + Tailscale · GitHub Actions</footer>
    </div>

    <script>
        // Frontend JavaScript gọi đến API backend của chính nó
        const API_BASE = '/api'; // Vercel Serverless Functions

        async function callApi(endpoint, data) {
            const res = await fetch(`${API_BASE}/${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.json();
        }

        async function setupAndDeploy() {
            const token = document.getElementById('github_token').value.trim();
            if (!token) return alert('Nhập GitHub Token');
            showStatus('setupStatus', 'Đang tạo repo...', 'loading');
            try {
                const result = await callApi('create-repo', { token });
                if (result.error) throw new Error(result.error);
                localStorage.setItem('gh_token', token);
                localStorage.setItem('gh_owner', result.owner);
                localStorage.setItem('gh_repo', result.repo);
                showStatus('setupStatus', `✅ Thành công: ${result.repo}`, 'success');
                await createVM(); // Tạo VM luôn sau khi có repo
            } catch (err) {
                showStatus('setupStatus', `❌ ${err.message}`, 'error');
            }
        }

        async function createVM() {
            // ... gọi api/deploy-vm
        }

        async function saveTailscaleToken() {
            const token = document.getElementById('tailscale_token').value.trim();
            if (token) {
                localStorage.setItem('tailscale_token', token);
                alert('Đã lưu token Tailscale (sẽ dùng cho lần tạo VM sau)');
            }
        }

        // ... các hàm quản lý VM, timer, kết nối noVNC (tương tự)
    </script>
</body>
</html>
