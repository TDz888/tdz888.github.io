<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural VM Pro</title>

<style>
/* ===== GIỮ NGUYÊN PHONG CÁCH GLASS ===== */
body {
    background: radial-gradient(circle at top, #1a1f2e, #07090f);
    color: white;
    font-family: system-ui;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
}

button {
    background: linear-gradient(135deg,#2C6EFF,#1A4FCC);
    border: none;
    padding: 12px;
    border-radius: 12px;
    width: 100%;
    color: white;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}
</style>

</head>

<body>
<div class="container">

<h2>🧠 Neural VM Pro</h2>

<div class="card">
<input id="github_token" placeholder="GitHub Token">

<select id="target_os">
<option value="windows">Windows 11</option>
<option value="ubuntu22">Ubuntu 22.04</option>
</select>

<select id="duration">
<option value="60">1 giờ</option>
<option value="120">2 giờ</option>
<option value="240">4 giờ</option>
</select>

<button onclick="setup()">✨ Tạo repo + setup</button> <button onclick="runVM()">🚀 Chạy VM</button>

</div>

</div>

<script>
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

async function getUser(token){
    const r = await fetch("https://api.github.com/user",{
        headers:{Authorization:"token "+token}
    })
    const d = await r.json()
    return d.login
}

async function setup(){
    const token = document.getElementById("github_token").value
    if(!token) return alert("Nhập token")

    const owner = await getUser(token)
    const repo = "neural-vm-"+Date.now()

    await fetch("https://api.github.com/user/repos",{
        method:"POST",
        headers:{
            Authorization:"token "+token,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({name:repo,auto_init:true})
    })

    await sleep(2000)

    const yml = `name: Neural VM

on:
  workflow_dispatch:
    inputs:
      duration:
        required: true
      target_os:
        required: true

jobs:

  windows:
    if: github.event.inputs.target_os == 'windows'
    runs-on: windows-latest
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\\System\\CurrentControlSet\\Control\\Terminal Server' -Name "fDenyTSConnections" -Value 0
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

      - name: Create User
        run: |
          $user = "vmuser" + (Get-Random)
          $pass = -join ((48..57 + 65..90 + 97..122) | Get-Random -Count 12 | % {[char]$_})
          net user $user $pass /add
          net localgroup Administrators $user /add

      - name: Keep Alive
        run: timeout /t 600

  ubuntu:
    if: github.event.inputs.target_os == 'ubuntu22'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          sudo apt update
          sudo apt install -y openssh-server
          sudo systemctl start ssh

      - name: Keep Alive
        run: sleep 600
`

    const content = btoa(unescape(encodeURIComponent(yml)))

    await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/.github/workflows/vm.yml`,{
        method:"PUT",
        headers:{
            Authorization:"token "+token,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:"add workflow",
            content:content
        })
    })

    localStorage.setItem("token",token)
    localStorage.setItem("owner",owner)
    localStorage.setItem("repo",repo)

    alert("✅ Setup xong!")
}

async function runVM(){
    const token = localStorage.getItem("token")
    const owner = localStorage.getItem("owner")
    const repo = localStorage.getItem("repo")

    const duration = document.getElementById("duration").value
    const os = document.getElementById("target_os").value

    await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/vm.yml/dispatches`,{
        method:"POST",
        headers:{
            Authorization:"token "+token,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            ref:"main",
            inputs:{duration:duration,target_os:os}
        })
    })

    alert("🚀 VM đang chạy! Vào GitHub → Actions để xem")
}
</script>

</body>
</html>
