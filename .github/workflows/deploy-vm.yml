name: NEURAL MASTER SYSTEM

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Session Duration
        required: true
        default: 2h
        type: choice
        options:
          - 30m
          - 1h
          - 2h
          - 4h
          - 6h
      target_os:
        description: Target OS
        required: true
        default: windows
        type: choice
        options:
          - windows
          - ubuntu22
          - ubuntu24
          - debian
          - centos
          - almalinux
          - all
      performance_mode:
        description: Performance Mode
        required: false
        default: balanced
        type: choice
        options:
          - balanced
          - performance
          - quantum

env:
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:
  windows_deploy:
    runs-on: windows-latest
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'all'
    timeout-minutes: 360
    steps:
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
      - name: Create User Account
        run: |
          $user = "neural_" + (Get-Random -Minimum 1000 -Maximum 9999)
          $pass = -join (((65..90) + (97..122) + (48..57)) | Get-Random -Count 16 | ForEach-Object {[char]$_})
          net user $user $pass /add
          net localgroup Administrators $user /add
          echo "USERNAME=$user" >> $env:GITHUB_ENV
          echo "PASSWORD=$pass" >> $env:GITHUB_ENV
      - name: Get Public IP
        run: |
          $ip = (Invoke-WebRequest -Uri https://api.ipify.org -UseBasicParsing).Content
          echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "$env:TEMP\tailscale.msi"
          msiexec /i "$env:TEMP\tailscale.msi" /quiet
          Start-Sleep -Seconds 10
          & 'C:\Program Files\Tailscale\tailscale.exe' up --authkey="$env:TAILSCALE_AUTH_KEY" --accept-routes
      - name: Keep Alive
        run: |
          $duration = 120
          $end = (Get-Date).AddMinutes($duration)
          while ((Get-Date) -lt $end) {
            $remaining = $end - (Get-Date)
            Write-Host "Windows VM Active - Time remaining: $($remaining.ToString())"
            Start-Sleep -Seconds 60
          }

  ubuntu_deploy:
    runs-on: ubuntu-22.04
    if: github.event.inputs.target_os == 'ubuntu22' || github.event.inputs.target_os == 'all'
    timeout-minutes: 360
    steps:
      - name: Install SSH Server
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openssh-server
          sudo systemctl enable ssh
          sudo systemctl start ssh
      - name: Create User Account
        run: |
          USER="ub_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          sudo useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes --accept-dns
      - name: Keep Alive
        run: |
          DURATION=120
          START=$(date +%s)
          END=$((START + DURATION * 60))
          while [ $(date +%s) -lt $END ]; do
            REMAINING=$((END - $(date +%s)))
            echo "Ubuntu VM Active - Time remaining: $((REMAINING / 60)) minutes"
            sleep 60
          done

  ubuntu24_deploy:
    runs-on: ubuntu-24.04
    if: github.event.inputs.target_os == 'ubuntu24' || github.event.inputs.target_os == 'all'
    timeout-minutes: 360
    steps:
      - name: Install SSH Server
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openssh-server
          sudo systemctl enable ssh
          sudo systemctl start ssh
      - name: Create User Account
        run: |
          USER="ub24_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          sudo useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes --accept-dns
      - name: Keep Alive
        run: |
          DURATION=120
          START=$(date +%s)
          END=$((START + DURATION * 60))
          while [ $(date +%s) -lt $END ]; do
            REMAINING=$((END - $(date +%s)))
            echo "Ubuntu 24.04 VM Active - Time remaining: $((REMAINING / 60)) minutes"
            sleep 60
          done

  debian_deploy:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    if: github.event.inputs.target_os == 'debian' || github.event.inputs.target_os == 'all'
    timeout-minutes: 360
    steps:
      - name: Install SSH Server
        run: |
          apt update -qq
          apt install -y -qq openssh-server sudo curl
          ssh-keygen -A
          /usr/sbin/sshd
      - name: Create User Account
        run: |
          USER="deb_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | chpasswd
          usermod -aG sudo "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(wget -qO- https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes --accept-dns
      - name: Keep Alive
        run: |
          DURATION=120
          START=$(date +%s)
          END=$((START + DURATION * 60))
          while [ $(date +%s) -lt $END ]; do
            REMAINING=$((END - $(date +%s)))
            echo "Debian VM Active - Time remaining: $((REMAINING / 60)) minutes"
            sleep 60
          done

  centos_deploy:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    if: github.event.inputs.target_os == 'centos' || github.event.inputs.target_os == 'all'
    timeout-minutes: 360
    steps:
      - name: Install SSH Server
        run: |
          dnf install -y openssh-server sudo curl
          ssh-keygen -A
          /usr/sbin/sshd
      - name: Create User Account
        run: |
          USER="cent_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | chpasswd
          usermod -aG wheel "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes --accept-dns
      - name: Keep Alive
        run: |
          DURATION=120
          START=$(date +%s)
          END=$((START + DURATION * 60))
          while [ $(date +%s) -lt $END ]; do
            REMAINING=$((END - $(date +%s)))
            echo "CentOS VM Active - Time remaining: $((REMAINING / 60)) minutes"
            sleep 60
          done

  almalinux_deploy:
    runs-on: ubuntu-latest
    container:
      image: almalinux:9
    if: github.event.inputs.target_os == 'almalinux' || github.event.inputs.target_os == 'all'
    timeout-minutes: 360
    steps:
      - name: Install SSH Server
        run: |
          dnf install -y openssh-server sudo curl
          ssh-keygen -A
          /usr/sbin/sshd
      - name: Create User Account
        run: |
          USER="alma_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | chpasswd
          usermod -aG wheel "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes --accept-dns
      - name: Keep Alive
        run: |
          DURATION=120
          START=$(date +%s)
          END=$((START + DURATION * 60))
          while [ $(date +%s) -lt $END ]; do
            REMAINING=$((END - $(date +%s)))
            echo "AlmaLinux VM Active - Time remaining: $((REMAINING / 60)) minutes"
            sleep 60
          done
