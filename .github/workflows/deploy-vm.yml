name: Neural VM Deploy

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration minutes'
        required: true
        default: '120'
      target_os:
        description: 'Target OS'
        required: true
        default: 'windows'
      performance_mode:
        description: 'Performance'
        required: false
        default: 'balanced'

env:
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:
  windows:
    runs-on: windows-latest
    if: github.event.inputs.target_os == 'windows'
    timeout-minutes: 360
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
      - name: Create User
        run: |
          $user = "vmuser_" + (Get-Random -Minimum 1000 -Maximum 9999)
          $pass = -join (((65..90) + (97..122) + (48..57)) | Get-Random -Count 16 | ForEach-Object {[char]$_})
          net user $user $pass /add
          net localgroup Administrators $user /add
          echo "USERNAME=$user" >> $env:GITHUB_ENV
          echo "PASSWORD=$pass" >> $env:GITHUB_ENV
      - name: Get Public IP
        run: |
          $ip = (Invoke-WebRequest -Uri https://api.ipify.org -UseBasicParsing).Content
          echo "PUBLIC_IP=$ip" >> $env:GITHUB_ENV
      - name: Get Tailscale IP
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile tailscale.msi
          msiexec /i tailscale.msi /quiet
          Start-Sleep -Seconds 10
          & 'C:\Program Files\Tailscale\tailscale.exe' up --authkey="$env:TAILSCALE_AUTH_KEY" --accept-routes
          $tsIp = & 'C:\Program Files\Tailscale\tailscale.exe' ip -4
          echo "TAILSCALE_IP=$tsIp" >> $env:GITHUB_ENV
      - name: Keep Alive
        run: |
          $dur = [int]"${{ github.event.inputs.duration }}"
          $end = (Get-Date).AddMinutes($dur)
          while ((Get-Date) -lt $end) {
            Write-Host "Windows VM Active - Time remaining: $($end - (Get-Date))"
            Start-Sleep -Seconds 60
          }

  ubuntu22:
    runs-on: ubuntu-22.04
    if: github.event.inputs.target_os == 'ubuntu22'
    timeout-minutes: 360
    steps:
      - name: Setup SSH
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openssh-server
          sudo systemctl enable ssh
          sudo systemctl start ssh
      - name: Create User
        run: |
          USER="ub_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          sudo useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
      - name: Keep Alive
        run: |
          DUR=${{ github.event.inputs.duration }}
          END=$(( $(date +%s) + DUR * 60 ))
          while [ $(date +%s) -lt $END ]; do
            echo "Ubuntu VM Active - Time remaining: $(( ($END - $(date +%s)) / 60 )) minutes"
            sleep 60
          done

  ubuntu24:
    runs-on: ubuntu-24.04
    if: github.event.inputs.target_os == 'ubuntu24'
    timeout-minutes: 360
    steps:
      - name: Setup SSH
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openssh-server
          sudo systemctl enable ssh
          sudo systemctl start ssh
      - name: Create User
        run: |
          USER="ub24_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          sudo useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
      - name: Keep Alive
        run: |
          DUR=${{ github.event.inputs.duration }}
          END=$(( $(date +%s) + DUR * 60 ))
          while [ $(date +%s) -lt $END ]; do
            echo "Ubuntu 24.04 VM Active"
            sleep 60
          done

  debian:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    if: github.event.inputs.target_os == 'debian'
    timeout-minutes: 360
    steps:
      - name: Setup SSH
        run: |
          apt update -qq
          apt install -y -qq openssh-server sudo curl
          ssh-keygen -A
          /usr/sbin/sshd
      - name: Create User
        run: |
          USER="deb_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | chpasswd
          usermod -aG sudo "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(wget -qO- https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
      - name: Keep Alive
        run: |
          DUR=${{ github.event.inputs.duration }}
          sleep $((DUR * 60))

  centos:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    if: github.event.inputs.target_os == 'centos'
    timeout-minutes: 360
    steps:
      - name: Setup SSH
        run: |
          dnf install -y openssh-server sudo curl
          ssh-keygen -A
          /usr/sbin/sshd
      - name: Create User
        run: |
          USER="cent_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | chpasswd
          usermod -aG wheel "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
      - name: Keep Alive
        run: |
          DUR=${{ github.event.inputs.duration }}
          sleep $((DUR * 60))

  almalinux:
    runs-on: ubuntu-latest
    container:
      image: almalinux:9
    if: github.event.inputs.target_os == 'almalinux'
    timeout-minutes: 360
    steps:
      - name: Setup SSH
        run: |
          dnf install -y openssh-server sudo curl
          ssh-keygen -A
          /usr/sbin/sshd
      - name: Create User
        run: |
          USER="alma_$((RANDOM % 9000 + 1000))"
          PASS=$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)
          useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | chpasswd
          usermod -aG wheel "$USER"
          echo "USERNAME=$USER" >> $GITHUB_ENV
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
      - name: Get Public IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "PUBLIC_IP=$IP" >> $GITHUB_ENV
      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes
          TS_IP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
      - name: Keep Alive
        run: |
          DUR=${{ github.event.inputs.duration }}
          sleep $((DUR * 60))
