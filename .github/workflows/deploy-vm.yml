name: Neural VM Deploy

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration minutes"
        required: true
        default: "120"
      target_os:
        description: "Target OS"
        required: true
        default: "windows"
      performance_mode:
        description: "Performance"
        required: false
        default: "balanced"

jobs:

  windows:
    runs-on: windows-latest
    if: github.event.inputs.target_os == 'windows'
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

      - name: Create User
        run: |
          $user = "vmuser" + (Get-Random)
          $pass = -join ((48..57 + 65..90 + 97..122) | Get-Random -Count 12 | % {[char]$_})
          net user $user $pass /add
          net localgroup Administrators $user /add
          echo "USER=$user" >> $env:GITHUB_ENV
          echo "PASS=$pass" >> $env:GITHUB_ENV

      - name: Get IP
        run: |
          $ip = (Invoke-WebRequest -Uri "https://api.ipify.org").Content
          echo "IP=$ip" >> $env:GITHUB_ENV

      - name: Show Info
        run: |
          echo "IP: $env:IP"
          echo "User: $env:USER"
          echo "Pass: $env:PASS"

      - name: Keep Alive
        run: |
          $dur = [int]"${{ github.event.inputs.duration }}"
          Start-Sleep -Seconds ($dur * 60)

  ubuntu:
    runs-on: ubuntu-latest
    if: github.event.inputs.target_os == 'ubuntu22' || github.event.inputs.target_os == 'ubuntu24'
    timeout-minutes: 360

    steps:
      - name: Setup SSH
        run: |
          sudo apt update
          sudo apt install -y openssh-server
          sudo systemctl start ssh

      - name: Create User
        run: |
          USER="user$RANDOM"
          PASS=$(openssl rand -base64 12)
          sudo useradd -m -s /bin/bash $USER
          echo "$USER:$PASS" | sudo chpasswd
          echo "USER=$USER" >> $GITHUB_ENV
          echo "PASS=$PASS" >> $GITHUB_ENV

      - name: Get IP
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "IP=$IP" >> $GITHUB_ENV

      - name: Show Info
        run: |
          echo "IP: $IP"
          echo "User: $USER"
          echo "Pass: $PASS"

      - name: Keep Alive
        run: |
          sleep $(( ${{ github.event.inputs.duration }} * 60 ))
