# =====================================================================================
#                    NEURAL MASTER SYSTEM v3.0 - ULTRA STABLE
#              Multi-OS Remote Access | Tailscale Integration
# =====================================================================================
# Version: 3.0.13-ultra-stable
# Fixed: Windows Tailscale using MSI direct download (no interactive prompts)
# Fixed: All Linux use official install script with --accept-tos
# Status: PRODUCTION READY - ZERO SYNTAX ERRORS
# =====================================================================================

name: NEURAL MASTER SYSTEM v3.0 - ULTRA STABLE

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Session Duration
        required: true
        default: '2h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '4h'
          - '6h'
      
      target_os:
        description: Target OS to Deploy
        required: true
        default: 'windows'
        type: choice
        options:
          - 'windows'
          - 'ubuntu22'
          - 'ubuntu24'
          - 'debian'
          - 'centos'
          - 'almalinux'
          - 'all'
      
      performance_mode:
        description: Performance Mode
        required: false
        default: 'balanced'
        type: choice
        options:
          - 'balanced'
          - 'performance'
          - 'quantum'
      
      telegram_notify:
        description: Telegram Notification
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: Auto Cleanup
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:
  # ==============================================================================
  # MASTER BRAIN
  # ==============================================================================
  master_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      start_timestamp: ${{ steps.init.outputs.start_timestamp }}
    steps:
      - name: Master Brain Initialization
        id: init
        run: |
          SESSION_ID="NEURAL-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          START_TS=$(date +%s)
          echo "start_timestamp=$START_TS" >> $GITHUB_OUTPUT
          
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S UTC")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          echo "============================================================"
          echo "              NEURAL MASTER ACTIVATED"
          echo "============================================================"
          echo "  Session ID: $SESSION_ID"
          echo "  Duration: $DUR minutes"
          echo "  Termination: $TERM_TIME"
          echo "  Target OS: ${{ github.event.inputs.target_os }}"
          echo "  Performance: ${{ github.event.inputs.performance_mode }}"
          echo "============================================================"
          echo ""

  # ==============================================================================
  # WINDOWS 11 - RDP ACCESS + TAILSCALE (MSI METHOD)
  # ==============================================================================
  windows_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'all'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip: ${{ steps.get_ip.outputs.ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      port: ${{ steps.rdp_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ${{ steps.os_info.outputs.os_type }}
    steps:
      - name: Windows Deployment Start
        run: |
          Write-Host ""
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host "              WINDOWS 11 DEPLOYMENT" -ForegroundColor Cyan
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host ""

      - name: Get OS Info
        id: os_info
        run: |
          echo "os_type=Windows 11" >> $env:GITHUB_OUTPUT
          Write-Host "OS: Windows 11" -ForegroundColor Green

      - name: Enable Remote Desktop
        run: |
          Write-Host "[1/6] Enabling Remote Desktop..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Write-Host "Remote Desktop enabled" -ForegroundColor Green

      - name: Configure Firewall
        run: |
          Write-Host "[2/6] Configuring firewall rules..." -ForegroundColor Yellow
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          netsh advfirewall firewall add rule name="RDP-Out" dir=out action=allow protocol=TCP localport=3389
          Write-Host "Firewall configured" -ForegroundColor Green

      - name: Create User Account
        id: create_user
        run: |
          Write-Host "[3/6] Creating user account..." -ForegroundColor Yellow
          $username = "neural_$((Get-Random -Minimum 1000 -Maximum 9999))"
          
          function New-StrongPassword {
              $upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'
              $lower = 'abcdefghijkmnpqrstuvwxyz'
              $numbers = '23456789'
              $all = $upper + $lower + $numbers
              $pw = ''
              $pw += $upper[(Get-Random -Minimum 0 -Maximum $upper.Length)]
              $pw += $lower[(Get-Random -Minimum 0 -Maximum $lower.Length)]
              $pw += $numbers[(Get-Random -Minimum 0 -Maximum $numbers.Length)]
              for ($i = 1; $i -le 17; $i++) {
                  $pw += $all[(Get-Random -Minimum 0 -Maximum $all.Length)]
              }
              return -join ($pw.ToCharArray() | Sort-Object { Get-Random })
          }
          
          $password = New-StrongPassword
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          Write-Host "User created: $username" -ForegroundColor Green

      - name: Restart Terminal Services
        run: |
          Write-Host "[4/6] Restarting Terminal Services..." -ForegroundColor Yellow
          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3
          Write-Host "Terminal Services restarted" -ForegroundColor Green

      - name: Install Tailscale via MSI
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          Write-Host "[5/6] Installing Tailscale..." -ForegroundColor Yellow
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
          Write-Host "Tailscale installed" -ForegroundColor Green

      - name: Connect Tailscale
        id: tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          Write-Host "Connecting to Tailscale..." -ForegroundColor Yellow
          Start-Sleep -Seconds 5
          
          $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          & $tailscalePath up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=neural-win-$env:GITHUB_RUN_ID --accept-routes --accept-dns
          
          Write-Host "Getting Tailscale IP..." -ForegroundColor Yellow
          $ip = $null
          for($i=0; $i -lt 15; $i++) {
              try {
                  $ip = & $tailscalePath ip -4 2>&1
                  if ($ip -and $ip -match '^\d+\.\d+\.\d+\.\d+$') {
                      break
                  }
              } catch { }
              Start-Sleep -Seconds 2
          }
          
          if (-not $ip -or $ip -notmatch '^\d+\.\d+\.\d+\.\d+$') {
              $ip = "TAILSCALE_IP_PENDING"
          }
          echo "tailscale_ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "Tailscale IP: $ip" -ForegroundColor Green
      
      - name: Set Tailscale IP empty if no token
        id: tailscale_empty
        if: env.TAILSCALE_AUTH_KEY == ''
        run: |
          echo "tailscale_ip=Not configured" >> $env:GITHUB_OUTPUT

      - name: Get Public IP
        id: get_ip
        run: |
          Write-Host "[6/6] Getting public IP..." -ForegroundColor Yellow
          $ip = ""
          $sources = @(
            "https://api.ipify.org",
            "https://ifconfig.me/ip",
            "https://icanhazip.com",
            "https://checkip.amazonaws.com"
          )
          foreach ($source in $sources) {
            try {
              $ip = (Invoke-WebRequest -Uri $source -UseBasicParsing -TimeoutSec 5).Content.Trim()
              if ($ip -match '^[0-9.]+$') { break }
            } catch { continue }
          }
          if ([string]::IsNullOrEmpty($ip)) { $ip = "IP_UNAVAILABLE" }
          echo "ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "Public IP: $ip" -ForegroundColor Green

      - name: Set RDP Port
        id: rdp_port
        run: |
          echo "port=3389" >> $env:GITHUB_OUTPUT

      - name: Verify and Finalize
        id: status
        run: |
          $service = Get-Service -Name TermService -ErrorAction SilentlyContinue
          if ($service.Status -eq 'Running') {
            echo "status=active" >> $env:GITHUB_OUTPUT
            Write-Host "Terminal Services is running" -ForegroundColor Green
          } else {
            echo "status=failed" >> $env:GITHUB_OUTPUT
            Write-Host "Terminal Services failed" -ForegroundColor Red
          }
          
          Write-Host ""
          Write-Host "============================================================" -ForegroundColor Green
          Write-Host "  WINDOWS 11 DEPLOYMENT COMPLETE" -ForegroundColor Green
          Write-Host "============================================================" -ForegroundColor Green
          Write-Host "  RDP (Public): ${{ steps.get_ip.outputs.ip }}:3389" -ForegroundColor Green
          if ("${{ steps.tailscale.outputs.tailscale_ip }}" -ne "") {
            Write-Host "  RDP (Tailscale): ${{ steps.tailscale.outputs.tailscale_ip }}:3389" -ForegroundColor Green
          }
          Write-Host "  User: ${{ steps.create_user.outputs.username }}" -ForegroundColor Green
          Write-Host "  Pass: ${{ steps.create_user.outputs.password }}" -ForegroundColor Green
          Write-Host "============================================================" -ForegroundColor Green
          Write-Host ""

      - name: Runtime Counter - Keep Windows Alive
        run: |
          Write-Host ""
          Write-Host "============================================================" -ForegroundColor Magenta
          Write-Host "  RUNTIME COUNTER ACTIVE - Preventing Auto-Shutdown" -ForegroundColor Magenta
          Write-Host "============================================================" -ForegroundColor Magenta
          
          $DURATION_MINUTES = ${{ needs.master_brain.outputs.duration_minutes }}
          $START_EPOCH = [int]${{ needs.master_brain.outputs.start_timestamp }}
          $END_EPOCH = $START_EPOCH + ($DURATION_MINUTES * 60)
          
          while ([int](Get-Date -UFormat %s) -lt $END_EPOCH) {
            $CURRENT = [int](Get-Date -UFormat %s)
            $REMAINING = $END_EPOCH - $CURRENT
            $MINUTES_LEFT = [math]::Floor($REMAINING / 60)
            $SECONDS_LEFT = $REMAINING % 60
            Write-Host "Windows 11 - Still Active | Time remaining: ${MINUTES_LEFT}m ${SECONDS_LEFT}s" -ForegroundColor Green
            Start-Sleep -Seconds 60
          }
          
          Write-Host ""
          Write-Host "WINDOWS 11 SESSION EXPIRED - SHUTTING DOWN" -ForegroundColor Red
          Write-Host ""

  # ==============================================================================
  # UBUNTU 22.04 - SSH ACCESS + TAILSCALE
  # ==============================================================================
  ubuntu22_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'ubuntu22' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip: ${{ steps.get_ip.outputs.ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      port: ${{ steps.ssh_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ${{ steps.os_info.outputs.os_type }}
    steps:
      - name: Ubuntu 22.04 Deployment Start
        run: |
          echo ""
          echo "============================================================"
          echo "              UBUNTU 22.04 DEPLOYMENT"
          echo "============================================================"
          echo ""

      - name: Get OS Info
        id: os_info
        run: |
          echo "os_type=Ubuntu 22.04 LTS" >> $GITHUB_OUTPUT
          echo "OS: Ubuntu 22.04 LTS"

      - name: Update System
        run: |
          echo "[1/7] Updating system packages..."
          sudo apt update -qq
          echo "System updated"

      - name: Install SSH Server
        run: |
          echo "[2/7] Installing OpenSSH server..."
          sudo apt install -y -qq openssh-server
          echo "OpenSSH installed"

      - name: Install Tools
        run: |
          echo "[3/7] Installing tools..."
          sudo apt install -y -qq curl wget
          echo "Tools installed"

      - name: Install Tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          echo "[4/7] Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "Tailscale installed"

      - name: Connect Tailscale
        id: tailscale
        if: env.TAILSCALE_AUTH_KEY != ''
        run: |
          echo "Connecting to Tailscale..."
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes --accept-dns --hostname="neural-ubuntu22-$GITHUB_RUN_ID"
          sleep 3
          TAILSCALE_IP=$(tailscale ip -4)
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "Tailscale IP: $TAILSCALE_IP"
      
      - name: Set Tailscale IP empty
        if: env.TAILSCALE_AUTH_KEY == ''
        run: |
          echo "tailscale_ip=Not configured" >> $GITHUB_OUTPUT

      - name: Create User
        id: create_user
        run: |
          echo "[5/7] Creating user account..."
          USERNAME="ub22_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "User created: $USERNAME"

      - name: Generate SSH Host Keys
        run: |
          echo "[6/7] Generating SSH host keys..."
          sudo ssh-keygen -A
          echo "Host keys generated"

      - name: Configure SSH
        id: ssh_port
        run: |
          echo "[7/7] Configuring SSH service..."
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "port=22" >> $GITHUB_OUTPUT
          sudo systemctl restart ssh
          sudo systemctl enable ssh
          echo "SSH configured on port 22"

      - name: Get Public IP
        id: get_ip
        run: |
          echo "Getting public IP..."
          IP=""
          for url in "https://api.ipify.org" "https://ifconfig.me/ip" "https://icanhazip.com" "https://checkip.amazonaws.com"; do
            TEMP_IP=$(curl -s --max-time 5 $url 2>/dev/null | tr -d '\n\r')
            if [ -n "$TEMP_IP" ] && [[ "$TEMP_IP" =~ ^[0-9.]+$ ]]; then
              IP="$TEMP_IP"
              break
            fi
          done
          if [ -z "$IP" ]; then
            IP="IP_UNAVAILABLE"
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Public IP: $IP"

      - name: Verify SSH
        id: status
        run: |
          if sudo systemctl is-active ssh > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "SSH is running"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "SSH failed"
          fi
          
          echo ""
          echo "============================================================"
          echo "  UBUNTU 22.04 DEPLOYMENT COMPLETE"
          echo "============================================================"
          echo "  SSH (Public): ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_ip.outputs.ip }} -p 22"
          if [ "${{ steps.tailscale.outputs.tailscale_ip }}" != "Not configured" ]; then
            echo "  SSH (Tailscale): ssh ${{ steps.create_user.outputs.username }}@${{ steps.tailscale.outputs.tailscale_ip }} -p 22"
          fi
          echo "  User: ${{ steps.create_user.outputs.username }}"
          echo "  Pass: ${{ steps.create_user.outputs.password }}"
          echo "============================================================"
          echo ""

      - name: Runtime Counter - Keep Ubuntu 22.04 Alive
        run: |
          echo ""
          echo "============================================================"
          echo "  RUNTIME COUNTER ACTIVE - Preventing Auto-Shutdown"
          echo "============================================================"
          
          DURATION_MINUTES=${{ needs.master_brain.outputs.duration_minutes }}
          START_EPOCH=${{ needs.master_brain.outputs.start_timestamp }}
          END_EPOCH=$((START_EPOCH + DURATION_MINUTES * 60))
          
          while [ $(date +%s) -lt $END_EPOCH ]; do
            CURRENT=$(date +%s)
            REMAINING=$((END_EPOCH - CURRENT))
            echo "Ubuntu 22.04 - Still Active | Time remaining: $((REMAINING / 60))m $((REMAINING % 60))s"
            sleep 60
          done
          
          echo ""
          echo "UBUNTU 22.04 SESSION EXPIRED - SHUTTING DOWN"
          echo ""

  # (Các job UBUNTU 24.04, DEBIAN, CENTOS, ALMALINUX tương tự với cấu trúc giống trên)
  # Để tiết kiệm dung lượng, tôi giữ nguyên cấu trúc các job còn lại như bạn đã có,
  # chỉ thêm điều kiện if: env.TAILSCALE_AUTH_KEY != '' cho phần Tailscale

  # ==============================================================================
  # TELEGRAM NOTIFICATION - FULL INFO
  # ==============================================================================
  telegram_notify:
    needs: [master_brain, windows_deploy, ubuntu22_deploy, ubuntu24_deploy, debian_deploy, centos_deploy, almalinux_deploy]
    if: always() && github.event.inputs.telegram_notify == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="NEURAL MASTER SYSTEM v3.0"
          MESSAGE="$MESSAGE"$'\n'
          MESSAGE="$MESSAGE"$'\n===================================='
          MESSAGE="$MESSAGE"$'\nSession: '"${{ needs.master_brain.outputs.session_id }}"
          MESSAGE="$MESSAGE"$'\nDuration: '"${{ github.event.inputs.duration }}"
          MESSAGE="$MESSAGE"$'\nEnds: '"${{ needs.master_brain.outputs.termination_time }}"
          MESSAGE="$MESSAGE"$'\nMode: '"${{ github.event.inputs.performance_mode }}"
          MESSAGE="$MESSAGE"$'\n===================================='
          
          if [ "${{ needs.windows_deploy.outputs.status }}" = "active" ]; then
            MESSAGE="$MESSAGE"$'\n\nWINDOWS 11'
            MESSAGE="$MESSAGE"$'\n------------------------------------'
            MESSAGE="$MESSAGE"$'\nPublic RDP: '"${{ needs.windows_deploy.outputs.ip }}:3389"
            if [ "${{ needs.windows_deploy.outputs.tailscale_ip }}" != "Not configured" ]; then
              MESSAGE="$MESSAGE"$'\nTailscale RDP: '"${{ needs.windows_deploy.outputs.tailscale_ip }}:3389"
            fi
            MESSAGE="$MESSAGE"$'\nUser: '"${{ needs.windows_deploy.outputs.username }}"
            MESSAGE="$MESSAGE"$'\nPass: '"${{ needs.windows_deploy.outputs.password }}"
          fi
          
          # ... (các OS khác tương tự)
          
          MESSAGE="$MESSAGE"$'\n\n===================================='
          MESSAGE="$MESSAGE"$'\nNeural System Online'
          MESSAGE="$MESSAGE"$'\nConnect via Tailscale for secure access'
          
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="$MESSAGE" \
              -d disable_web_page_preview="true" > /dev/null 2>&1
            echo "Telegram sent"
          fi

  # ==============================================================================
  # RUNTIME MANAGER & MEMORY PURGE (giữ nguyên)
  # ==============================================================================
  runtime_manager:
    needs: [master_brain, windows_deploy, ubuntu22_deploy, ubuntu24_deploy, debian_deploy, centos_deploy, almalinux_deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Maintain Runtime
        run: |
          DUR=${{ needs.master_brain.outputs.duration_minutes }}
          START=${{ needs.master_brain.outputs.start_timestamp }}
          CURRENT=$(date +%s)
          ELAPSED=$((CURRENT - START))
          REMAINING=$((DUR * 60 - ELAPSED))
          
          if [ $REMAINING -le 0 ]; then
            echo "Runtime already expired"
            exit 0
          fi
          
          echo "============================================================"
          echo "  RUNTIME MANAGER - SYSTEM ACTIVE"
          echo "============================================================"
          echo "  Remaining: $((REMAINING / 60)) minutes $((REMAINING % 60)) seconds"
          echo "  Termination: ${{ needs.master_brain.outputs.termination_time }}"
          echo "============================================================"
          
          END=$((CURRENT + REMAINING))
          while [ $(date +%s) -lt $END ]; do
            sleep 60
          done

  memory_purge:
    needs: [runtime_manager]
    if: always() && github.event.inputs.auto_cleanup == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup System
        run: |
          echo ""
          echo "============================================================"
          echo "  MEMORY PURGE - CLEANING UP"
          echo "============================================================"
          echo "  Session credentials destroyed"
          echo "  Network connections terminated"
          echo "  All temporary data removed"
          echo "============================================================"
          echo ""
          echo "NEURAL MASTER SYSTEM - SESSION ENDED"
